<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Кнопка</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
      overflow: hidden;
    }

    button {
      padding: 20px 40px;
      font-size: 24px;
      border: none;
      border-radius: 20px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255, 77, 109, 0.6);
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
    }

    video {
      position: fixed;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .rotate {
      transform: rotate(180deg);
      transition: transform 0.5s;
    }
  </style>
</head>
<body>

<button onclick="start()">НАЖМИ 😈</button>

<video id="video" src="koullega_2026-04-14-21-21-15_1776190875555.mp4"></video>

<script>
async function start() {
  let video = document.getElementById("video");

  // fullscreen
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  }

  // попытка повернуть экран
  if (screen.orientation && screen.orientation.lock) {
    try {
      await screen.orientation.lock("landscape");
    } catch (e) {}
  }

  // переворот
  document.body.classList.add("rotate");

  // запуск видео
  video.style.display = "block";
  video.play();
}
</script>

</body>
</html>
